name: Star list generator
description: |
  Generate a list of repositories that the running user has starred.
inputs:
  token:
    description: |
      A GitHub Personal Access Token (PAT) used to fetch stars and push changes.
      The default `GITHUB_TOKEN` is insufficient. Classic PATs require `public_repo`
      for public repositories or `repo` for private repositories. Fine-grained PATs
      must be scoped to the target repository with `contents: read and write`.
    required: true
  config_file:
    description: |
      The TOML configuration file to load. Must not be specified if `config` is provided.
      See `ACTION.md` for details.
  config:
    description: |
      The TOML configuration to use. Must not be specified if `config_file` is provided.
      See `ACTION.md` for details.

runs:
  using: 'node24'
  main: 'dist/starlist.js'

branding:
  icon: star
  color: yellow
