name: Star list generator
description: |
  Generate a list of repositories that the running user has starred.
inputs:
  token:
    description: |
      A GitHub Personal Access Token (PAT) that is not the default actions token. 
      Classic PATs require no additional OAuth scopes. Fine-grained PATs should be scoped
      to include the target repository and the permissions
      `repository:contents:read-write`, `repository:metadata:read-only`, and
      `account:starring:read-only`.
    required: true
  config_file:
    description: |
      The TOML configuration file to load. Must not be specified if `config` is provided.
      See `ACTION.md` for details.
  config:
    description: |
      The TOML configuration to use. Must not be specified if `config_file` is provided.
      See `ACTION.md` for details.

runs:
  using: 'node24'
  main: 'dist/starlist.js'

branding:
  icon: star
  color: yellow
